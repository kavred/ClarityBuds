name: ClarityBuds
options:
  bundleIdPrefix: com.claritybuds
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.30"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: true

targets:
  ClarityBuds:
    type: application
    platform: macOS
    sources:
      - path: ClarityBuds
        excludes:
          - "Resources/Assets.xcassets/MenuBarIcon.symbolset"
    resources:
      - path: ClarityBuds/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claritybuds.app
        PRODUCT_NAME: ClarityBuds
        INFOPLIST_FILE: ClarityBuds/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClarityBuds/ClarityBuds.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        COMBINE_HIDPI_IMAGES: true
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_USER_SCRIPT_SANDBOXING: false
